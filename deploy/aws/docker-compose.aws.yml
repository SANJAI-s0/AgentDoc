version: "3.9"

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: agentdoc-backend
    env_file:
      - .env.aws
    environment:
      PORT: 8000
    depends_on:
      - mongodb
      - minio
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: /api
    container_name: agentdoc-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: agentdoc-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: agentdoc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    restart: unless-stopped

volumes:
  mongodb_data:
  minio_data:
