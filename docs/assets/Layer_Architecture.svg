<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" font-family="Arial, sans-serif">
  <rect width="1400" height="1100" fill="#0f1117"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="700" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">AgentDoc - Simplified Layer-wise Architecture</text>
  <rect x="160" y="58" width="960" height="172" rx="10" fill="#1e40af" stroke="#60a5fa" stroke-width="2"/>
  <text x="640" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Layer 1 - Presentation Layer</text>
  <rect x="185" y="97" width="270" height="115" rx="7" fill="#1d3a8a" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="320" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Vanilla JS SPA + GSAP</text>
  <text x="320" y="138" text-anchor="middle" font-size="11" fill="#ffffff">Hash-based Routing</text>
  <text x="320" y="155" text-anchor="middle" font-size="11" fill="#ffffff">#dashboard #documents #reviews</text>
  <text x="320" y="172" text-anchor="middle" font-size="11" fill="#ffffff">Served by Django Templates</text>
  <rect x="490" y="97" width="270" height="115" rx="7" fill="#1d3a8a" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="625" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">UI Components</text>
  <text x="625" y="138" text-anchor="middle" font-size="11" fill="#ffffff">Dashboard - Stats and Recent docs</text>
  <text x="625" y="155" text-anchor="middle" font-size="11" fill="#ffffff">Upload Form - File picker</text>
  <text x="625" y="172" text-anchor="middle" font-size="11" fill="#ffffff">Review Queue - Actions</text>
  <rect x="795" y="97" width="270" height="115" rx="7" fill="#1d3a8a" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="930" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Static Serving</text>
  <text x="930" y="138" text-anchor="middle" font-size="11" fill="#ffffff">Django Templates (index.html)</text>
  <text x="930" y="155" text-anchor="middle" font-size="11" fill="#ffffff">WhiteNoise - Compressed</text>
  <text x="930" y="172" text-anchor="middle" font-size="11" fill="#ffffff">CSS and JS bundles</text>
  <line x1="700" y1="230" x2="700" y2="268" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="608" y="240" width="184" height="20" rx="4" fill="#1e293b"/>
  <text x="700" y="254" text-anchor="middle" font-size="11" fill="#ffffff">HTTP / REST API - JWT Bearer</text>
  <rect x="30" y="270" width="1340" height="172" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="700" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Layer 2 - Application Layer</text>
  <rect x="55" y="310" width="255" height="115" rx="7" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="182" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Django 4.2 + DRF</text>
  <text x="182" y="351" text-anchor="middle" font-size="11" fill="#ffffff">Middleware Stack</text>
  <text x="182" y="368" text-anchor="middle" font-size="11" fill="#ffffff">Security CORS CSRF Session</text>
  <text x="182" y="385" text-anchor="middle" font-size="11" fill="#ffffff">Gunicorn WSGI Server</text>
  <text x="182" y="402" text-anchor="middle" font-size="11" fill="#ffffff">WhiteNoise static files</text>
  <rect x="330" y="310" width="270" height="115" rx="7" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="465" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SimpleJWT Auth + RBAC</text>
  <text x="465" y="351" text-anchor="middle" font-size="11" fill="#ffffff">Access token - 60 min</text>
  <text x="465" y="368" text-anchor="middle" font-size="11" fill="#ffffff">Refresh token - 7 days</text>
  <text x="465" y="385" text-anchor="middle" font-size="11" fill="#ffffff">customer / reviewer / admin</text>
  <text x="465" y="402" text-anchor="middle" font-size="11" fill="#ffffff">CSRF cookie protection</text>
  <rect x="620" y="310" width="270" height="115" rx="7" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="755" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">REST API Endpoints</text>
  <text x="755" y="351" text-anchor="middle" font-size="11" fill="#ffffff">POST /auth/signup login logout</text>
  <text x="755" y="368" text-anchor="middle" font-size="11" fill="#ffffff">POST /api/documents/ (upload)</text>
  <text x="755" y="385" text-anchor="middle" font-size="11" fill="#ffffff">GET /api/reviews/ /search/</text>
  <text x="755" y="402" text-anchor="middle" font-size="11" fill="#ffffff">GET /api/audit/:id /health</text>
  <rect x="910" y="310" width="430" height="115" rx="7" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="1125" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Workflow Trigger</text>
  <text x="1125" y="351" text-anchor="middle" font-size="11" fill="#ffffff">POST /api/documents/</text>
  <text x="1125" y="368" text-anchor="middle" font-size="11" fill="#ffffff">execute_document_workflow(payload)</text>
  <text x="1125" y="385" text-anchor="middle" font-size="11" fill="#ffffff">run_document_workflow_sync()</text>
  <text x="1125" y="402" text-anchor="middle" font-size="11" fill="#ffffff">DocumentCrewFactory.execute()</text>
  <line x1="700" y1="442" x2="700" y2="480" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="618" y="452" width="164" height="20" rx="4" fill="#1e293b"/>
  <text x="700" y="466" text-anchor="middle" font-size="11" fill="#ffffff">Internal Python Calls</text>
  <rect x="160" y="482" width="960" height="215" rx="10" fill="#4c1d95" stroke="#a78bfa" stroke-width="2"/>
  <text x="640" y="506" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Layer 3 - Agentic AI Layer (Core Intelligence)</text>
  <rect x="185" y="522" width="255" height="155" rx="7" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="312" y="544" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Orchestrator</text>
  <text x="312" y="563" text-anchor="middle" font-size="11" fill="#ffffff">DocumentCrewFactory</text>
  <text x="312" y="580" text-anchor="middle" font-size="11" fill="#ffffff">DocumentWorkflow.kick_off()</text>
  <text x="312" y="597" text-anchor="middle" font-size="11" fill="#ffffff">LangChain + Gemini 2.5 Flash</text>
  <text x="312" y="614" text-anchor="middle" font-size="11" fill="#ffffff">temperature = 0.1</text>
  <text x="312" y="631" text-anchor="middle" font-size="11" fill="#e9d5ff">Fallback: simulate() if no key</text>
  <text x="312" y="648" text-anchor="middle" font-size="11" fill="#e9d5ff">Pydantic WorkflowState output</text>
  <rect x="460" y="522" width="290" height="155" rx="7" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="605" y="544" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">5 Specialized Agents</text>
  <text x="605" y="563" text-anchor="middle" font-size="11" fill="#ffffff">1. Classification - type confidence</text>
  <text x="605" y="580" text-anchor="middle" font-size="11" fill="#ffffff">2. Extraction - Dual OCR fields</text>
  <text x="605" y="597" text-anchor="middle" font-size="11" fill="#ffffff">3. Validation - rules risk score</text>
  <text x="605" y="614" text-anchor="middle" font-size="11" fill="#ffffff">4. Routing - SLA queue decision</text>
  <text x="605" y="631" text-anchor="middle" font-size="11" fill="#ffffff">5. Audit - trail vector embed</text>
  <text x="605" y="651" text-anchor="middle" font-size="10" fill="#e9d5ff">Sequential pipeline to WorkflowState</text>
  <rect x="770" y="522" width="325" height="155" rx="7" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="932" y="544" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Tools and Prompt Library</text>
  <text x="932" y="563" text-anchor="middle" font-size="11" fill="#ffffff">OCRTool - Tesseract + PaddleOCR</text>
  <text x="932" y="580" text-anchor="middle" font-size="11" fill="#ffffff">PreprocessTool - OpenCV + Otsu</text>
  <text x="932" y="597" text-anchor="middle" font-size="11" fill="#ffffff">PolicyLookupTool - 8 doc types</text>
  <text x="932" y="614" text-anchor="middle" font-size="11" fill="#ffffff">FieldExtractionTool - regex</text>
  <text x="932" y="631" text-anchor="middle" font-size="11" fill="#ffffff">SearchKnowledgeTool - vectors</text>
  <text x="932" y="648" text-anchor="middle" font-size="11" fill="#ffffff">5 System Prompts (library.py)</text>
  <line x1="160" y1="615" x2="100" y2="615" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="100" y1="615" x2="100" y2="820" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="100" y1="820" x2="138" y2="820" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="82" y="720" text-anchor="middle" font-size="10" fill="#ffffff" transform="rotate(-90,82,720)">review_required</text>
  <line x1="700" y1="697" x2="700" y2="735" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="586" y="707" width="228" height="20" rx="4" fill="#1e293b"/>
  <text x="700" y="721" text-anchor="middle" font-size="11" fill="#ffffff">MongoService VectorSearch Minio</text>
  <rect x="30" y="737" width="1340" height="162" rx="10" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="761" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Layer 4 - Data and Storage Layer</text>
  <rect x="55" y="778" width="295" height="105" rx="7" fill="#431407" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="202" y="800" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">MongoDB 7</text>
  <text x="202" y="818" text-anchor="middle" font-size="11" fill="#ffffff">documents pages extractions</text>
  <text x="202" y="835" text-anchor="middle" font-size="11" fill="#ffffff">validation_results reviews audit_logs</text>
  <text x="202" y="852" text-anchor="middle" font-size="11" fill="#ffffff">Vector index - cosine 165-dim</text>
  <text x="202" y="869" text-anchor="middle" font-size="11" fill="#fcd34d">MiniLM-L6-v2 embeddings</text>
  <rect x="370" y="778" width="270" height="105" rx="7" fill="#431407" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="505" y="800" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SQLite</text>
  <text x="505" y="818" text-anchor="middle" font-size="11" fill="#ffffff">control_plane.sqlite3</text>
  <text x="505" y="835" text-anchor="middle" font-size="11" fill="#ffffff">Django auth sessions admin</text>
  <text x="505" y="852" text-anchor="middle" font-size="11" fill="#ffffff">Migrations and Django ORM</text>
  <rect x="660" y="778" width="270" height="105" rx="7" fill="#431407" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="795" y="800" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">File Storage</text>
  <text x="795" y="818" text-anchor="middle" font-size="11" fill="#ffffff">Local Disk (dev) USE_LOCAL_STORAGE</text>
  <text x="795" y="835" text-anchor="middle" font-size="11" fill="#ffffff">MinIO S3 (prod) S3-compatible</text>
  <text x="795" y="852" text-anchor="middle" font-size="11" fill="#ffffff">Presigned URLs 30 min upload</text>
  <text x="795" y="869" text-anchor="middle" font-size="11" fill="#fcd34d">incoming/doc_id/filename</text>
  <rect x="950" y="778" width="390" height="105" rx="7" fill="#431407" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1145" y="800" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Image Processing</text>
  <text x="1145" y="818" text-anchor="middle" font-size="11" fill="#ffffff">OpenCV - denoising binarization</text>
  <text x="1145" y="835" text-anchor="middle" font-size="11" fill="#ffffff">Laplacian quality score threshold 0.7</text>
  <text x="1145" y="852" text-anchor="middle" font-size="11" fill="#ffffff">Pillow - image open convert frames</text>
  <text x="1145" y="869" text-anchor="middle" font-size="11" fill="#fcd34d">pytesseract and PaddleOCR</text>
  <line x1="700" y1="899" x2="700" y2="937" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="630" y="909" width="140" height="20" rx="4" fill="#1e293b"/>
  <text x="700" y="923" text-anchor="middle" font-size="11" fill="#ffffff">Infrastructure</text>
  <rect x="160" y="939" width="1100" height="140" rx="10" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="710" y="963" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Layer 5 - Infrastructure Layer</text>
  <rect x="185" y="978" width="270" height="85" rx="7" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="320" y="999" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">WSGI Server</text>
  <text x="320" y="1017" text-anchor="middle" font-size="11" fill="#ffffff">Gunicorn - multi-worker</text>
  <text x="320" y="1034" text-anchor="middle" font-size="11" fill="#ffffff">WhiteNoise - static files</text>
  <text x="320" y="1051" text-anchor="middle" font-size="11" fill="#ffffff">bind 0.0.0.0:8000</text>
  <rect x="480" y="978" width="310" height="85" rx="7" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="635" y="999" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Deployment</text>
  <text x="635" y="1017" text-anchor="middle" font-size="11" fill="#ffffff">Render.com - render.yaml (current)</text>
  <text x="635" y="1034" text-anchor="middle" font-size="11" fill="#ffffff">Docker Compose - local dev</text>
  <text x="635" y="1051" text-anchor="middle" font-size="11" fill="#ffffff">Multi-stage Dockerfile - prod</text>
  <rect x="810" y="978" width="420" height="85" rx="7" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="1020" y="999" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Future - AWS</text>
  <text x="1020" y="1017" text-anchor="middle" font-size="11" fill="#ffffff">Elastic Beanstalk - managed hosting</text>
  <text x="1020" y="1034" text-anchor="middle" font-size="11" fill="#ffffff">S3 - document object storage</text>
  <text x="1020" y="1051" text-anchor="middle" font-size="11" fill="#ffffff">DocumentDB - MongoDB-compatible</text>
  <rect x="138" y="778" width="220" height="105" rx="7" fill="#164e63" stroke="#0891b2" stroke-width="1.5"/>
  <text x="248" y="800" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Notifications</text>
  <text x="248" y="818" text-anchor="middle" font-size="11" fill="#ffffff">NotificationService</text>
  <text x="248" y="835" text-anchor="middle" font-size="11" fill="#ffffff">send_review_email()</text>
  <text x="248" y="852" text-anchor="middle" font-size="11" fill="#ffffff">Dev: MailHog :1025</text>
  <text x="248" y="869" text-anchor="middle" font-size="11" fill="#cffafe">Prod: SMTP provider</text>
</svg>
