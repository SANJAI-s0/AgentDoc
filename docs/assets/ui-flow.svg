<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">UI Flow</title>
  <desc id="desc">Presentation-style UI flow for customer upload, dashboard, review queue, and reviewer decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#fbf7ef"/><stop offset="100%" stop-color="#efe2ca"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#635646" flood-opacity="0.16"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#173225"/></marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#173225}.sub{font:400 17px Arial,sans-serif;fill:#5b6d63}.lane{fill:#fff8ef;stroke:#d7c8b4;stroke-width:2;rx:22;filter:url(#shadow)}
      .node{fill:#eefaff;stroke:#1696b6;stroke-width:2;rx:18}.warn{fill:#fff4df;stroke:#d98e04;stroke-width:2;rx:18}.plain{fill:#fff;stroke:#567162;stroke-width:2;rx:18}
      .label{font:700 18px Arial,sans-serif;fill:#173225}.small{font:400 13px Arial,sans-serif;fill:#526258}.laneLabel{font:700 15px Arial,sans-serif;fill:#5d6e63}.arrow{stroke:#173225;stroke-width:3;fill:none;marker-end:url(#arrow)}.badge{font:700 15px Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}.legend{font:700 13px Arial,sans-serif;fill:#173225}.legendText{font:400 12px Arial,sans-serif;fill:#5d6e63}
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text class="title" x="46" y="58">UI Flow</text>
  <text class="sub" x="46" y="88">How customers and reviewers move through the React experience</text>
  <rect class="lane" x="42" y="126" width="1316" height="132"/><text class="laneLabel" x="64" y="158">Customer experience</text>
  <rect class="lane" x="42" y="286" width="1316" height="170"/><text class="laneLabel" x="64" y="318">React application</text>
  <rect class="lane" x="42" y="486" width="1316" height="182"/><text class="laneLabel" x="64" y="518">Reviewer experience</text>
  <circle cx="102" cy="191" r="24" fill="#1696b6"/><text class="badge" x="102" y="193">U</text>
  <rect class="node" x="152" y="156" width="230" height="72"/><text class="label" x="210" y="191">Document Upload</text><text class="small" x="188" y="212">submit file, type, metadata</text>
  <rect class="node" x="452" y="156" width="230" height="72"/><text class="label" x="525" y="191">Submission Status</text><text class="small" x="503" y="212">processing and review states</text>
  <rect class="node" x="752" y="156" width="230" height="72"/><text class="label" x="813" y="191">Search History</text><text class="small" x="786" y="212">find previous documents</text>
  <path class="arrow" d="M382 192 H452"/><path class="arrow" d="M682 192 H752"/>
  <circle cx="102" cy="370" r="24" fill="#1696b6"/><text class="badge" x="102" y="372">R</text>
  <rect class="node" x="152" y="334" width="220" height="76"/><text class="label" x="203" y="370">Dashboard</text><text class="small" x="183" y="392">workflow KPIs and recent docs</text>
  <rect class="node" x="436" y="334" width="220" height="76"/><text class="label" x="487" y="370">Review Queue</text><text class="small" x="469" y="392">items needing attention</text>
  <rect class="node" x="720" y="334" width="220" height="76"/><text class="label" x="781" y="370">Decision Panel</text><text class="small" x="768" y="392">approve, reject, request</text>
  <rect class="plain" x="1004" y="334" width="260" height="76"/><text class="label" x="1074" y="370">Search and Evidence View</text><text class="small" x="1070" y="392">compare extraction and history</text>
  <path class="arrow" d="M372 372 H436"/><path class="arrow" d="M656 372 H720"/><path class="arrow" d="M940 372 H1004"/>
  <circle cx="102" cy="576" r="24" fill="#d98e04"/><text class="badge" x="102" y="578">H</text>
  <rect class="warn" x="152" y="540" width="260" height="78"/><text class="label" x="214" y="577">Notification Email</text><text class="small" x="196" y="599">review requested from AI workflow</text>
  <rect class="warn" x="474" y="540" width="260" height="78"/><text class="label" x="550" y="577">Human Decision</text><text class="small" x="527" y="599">decision sent back to backend</text>
  <rect class="plain" x="796" y="540" width="390" height="78"/><text class="label" x="856" y="577">Operational Outcome</text><text class="small" x="856" y="599">document completes, rejects, or stays in controlled follow-up based on reviewer action</text>
  <path class="arrow" d="M412 579 H474"/><path class="arrow" d="M734 579 H796"/>
  <text class="legend" x="46" y="722">Legend</text><rect x="104" y="706" width="18" height="18" fill="#eefaff" stroke="#1696b6"/><text class="legendText" x="130" y="720">React UI stages</text><rect x="252" y="706" width="18" height="18" fill="#fff4df" stroke="#d98e04"/><text class="legendText" x="278" y="720">Human review interaction</text><rect x="468" y="706" width="18" height="18" fill="#fff" stroke="#567162"/><text class="legendText" x="494" y="720">Read-only insight or outcome view</text>
</svg>

