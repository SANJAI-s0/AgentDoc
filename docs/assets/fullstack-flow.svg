<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Full Stack Flow</title>
  <desc id="desc">Presentation-style full stack flow from React to Django to CrewAI, Gemini, MongoDB, MinIO, and human review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#fbf7ef"/><stop offset="100%" stop-color="#efe2ca"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#635646" flood-opacity="0.16"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#173225"/></marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#173225}.sub{font:400 17px Arial,sans-serif;fill:#5b6d63}.panel{fill:#fff8ef;stroke:#d7c8b4;stroke-width:2;rx:22;filter:url(#shadow)}
      .react{fill:#eefaff;stroke:#1696b6;stroke-width:2;rx:18}.dj{fill:#edf6ef;stroke:#0c4b33;stroke-width:2;rx:18}.queue{fill:#fff0eb;stroke:#d82c20;stroke-width:2;rx:18}.crew{fill:#eef2ff;stroke:#4564f2;stroke-width:2;rx:18}.gem{fill:#eef4ff;stroke:#4285f4;stroke-width:2;rx:18}.mongo{fill:#eefaf1;stroke:#47a248;stroke-width:2;rx:18}.minio{fill:#fff0f3;stroke:#c72e49;stroke-width:2;rx:18}.warn{fill:#fff4df;stroke:#d98e04;stroke-width:2;rx:18}.audit{fill:#f8ebe5;stroke:#b3452f;stroke-width:2;rx:18}
      .label{font:700 18px Arial,sans-serif;fill:#173225}.small{font:400 13px Arial,sans-serif;fill:#526258}.arrow{stroke:#173225;stroke-width:3;fill:none;marker-end:url(#arrow)}.badge{font:700 15px Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text class="title" x="46" y="58">Full Stack Flow</text>
  <text class="sub" x="46" y="88">From customer upload to automated decision, review, and audit closure</text>
  <rect class="panel" x="44" y="126" width="1312" height="574"/>
  <circle cx="96" cy="218" r="24" fill="#1696b6"/><text class="badge" x="96" y="220">R</text><rect class="react" x="146" y="182" width="180" height="76"/><text class="label" x="206" y="218">React</text><text class="small" x="183" y="240">upload and monitoring</text>
  <circle cx="396" cy="218" r="24" fill="#0c4b33"/><text class="badge" x="396" y="220">D</text><rect class="dj" x="446" y="182" width="180" height="76"/><text class="label" x="501" y="218">Django</text><text class="small" x="478" y="240">control plane and APIs</text>
  <circle cx="696" cy="218" r="24" fill="#d82c20"/><text class="badge" x="696" y="220">Q</text><rect class="queue" x="746" y="182" width="180" height="76"/><text class="label" x="783" y="218">Direct Django</text><text class="small" x="786" y="240">dispatch async work</text>
  <path class="arrow" d="M326 220 H446"/><path class="arrow" d="M626 220 H746"/>
  <circle cx="206" cy="426" r="24" fill="#4564f2"/><text class="badge" x="206" y="428">A</text><rect class="crew" x="256" y="390" width="200" height="82"/><text class="label" x="308" y="428">CrewAI Workflow</text><text class="small" x="292" y="450">orchestrate all document agents</text>
  <circle cx="540" cy="426" r="24" fill="#4285f4"/><text class="badge" x="540" y="428">G</text><rect class="gem" x="590" y="390" width="170" height="82"/><text class="label" x="644" y="428">Gemini</text><text class="small" x="622" y="450">reasoning and decisions</text>
  <circle cx="854" cy="426" r="24" fill="#47a248"/><text class="badge" x="854" y="428">M</text><rect class="mongo" x="904" y="390" width="180" height="82"/><text class="label" x="955" y="428">MongoDB</text><text class="small" x="926" y="450">workflow state and search</text>
  <circle cx="1170" cy="426" r="24" fill="#c72e49"/><text class="badge" x="1170" y="428">O</text><rect class="minio" x="1220" y="390" width="100" height="82"/><text class="label" x="1245" y="428">MinIO</text><text class="small" x="1239" y="450">files</text>
  <path class="arrow" d="M836 258 V430 H256"/><path class="arrow" d="M456 431 H590"/><path class="arrow" d="M760 431 H904"/><path class="arrow" d="M1084 431 H1220"/>
  <rect class="warn" x="342" y="558" width="280" height="86"/><text class="label" x="408" y="596">Human Review Branch</text><text class="small" x="382" y="618">triggered only when confidence, policy, or risk says automation should pause</text>
  <rect class="audit" x="720" y="558" width="320" height="86"/><text class="label" x="808" y="596">Audit and Final Status</text><text class="small" x="780" y="618">completed, rejected, or pending review with searchable event history</text>
  <path class="arrow" d="M994 472 V601 H622"/><path class="arrow" d="M1270 472 V601 H1040"/>
</svg>

