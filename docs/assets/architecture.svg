<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="820" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#e2e8f0">AgentDoc — System Architecture</text>
  <text x="550" y="64" text-anchor="middle" font-size="12" fill="#64748b">Django · MongoDB · MinIO · LangChain · Gemini AI · Sentence Transformers</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 1: CLIENT -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="85" width="1040" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="105" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">CLIENT LAYER</text>

  <!-- Browser SPA -->
  <rect x="60" y="112" width="160" height="50" rx="6" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Browser SPA</text>
  <text x="140" y="150" text-anchor="middle" font-size="10" fill="#bfdbfe">Vanilla JS · Hash Router</text>

  <!-- Pages -->
  <rect x="260" y="112" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="320" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Dashboard</text>
  <text x="320" y="150" text-anchor="middle" font-size="10" fill="#64748b">Stats · Recent Docs</text>

  <rect x="400" y="112" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="460" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Documents</text>
  <text x="460" y="150" text-anchor="middle" font-size="10" fill="#64748b">Upload · List · Detail</text>

  <rect x="540" y="112" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Reviews</text>
  <text x="600" y="150" text-anchor="middle" font-size="10" fill="#64748b">Queue · Actions</text>

  <!-- Auth -->
  <rect x="700" y="112" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="760" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Auth Pages</text>
  <text x="760" y="150" text-anchor="middle" font-size="10" fill="#64748b">Login · Signup</text>

  <!-- External API -->
  <rect x="860" y="112" width="180" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="950" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">External API Clients</text>
  <text x="950" y="150" text-anchor="middle" font-size="10" fill="#64748b">Mobile · Email · API</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 2: DJANGO BACKEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="200" width="1040" height="200" rx="8" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
  <text x="50" y="220" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">DJANGO BACKEND  (Python 3.11 · Django 4.2 · Gunicorn · WhiteNoise)</text>

  <!-- Middleware stack -->
  <rect x="50" y="228" width="200" height="155" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="150" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">Middleware Stack</text>
  <text x="150" y="263" text-anchor="middle" font-size="10" fill="#64748b">SecurityMiddleware</text>
  <text x="150" y="278" text-anchor="middle" font-size="10" fill="#64748b">WhiteNoise (static)</text>
  <text x="150" y="293" text-anchor="middle" font-size="10" fill="#64748b">CorsMiddleware</text>
  <text x="150" y="308" text-anchor="middle" font-size="10" fill="#64748b">SessionMiddleware</text>
  <text x="150" y="323" text-anchor="middle" font-size="10" fill="#64748b">CsrfViewMiddleware</text>
  <text x="150" y="338" text-anchor="middle" font-size="10" fill="#64748b">AuthenticationMiddleware</text>
  <text x="150" y="353" text-anchor="middle" font-size="10" fill="#64748b">JWT (SimpleJWT)</text>
  <text x="150" y="368" text-anchor="middle" font-size="10" fill="#64748b">ClickjackingMiddleware</text>

  <!-- API App -->
  <rect x="270" y="228" width="200" height="155" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="370" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">apps.api  (REST)</text>
  <text x="370" y="263" text-anchor="middle" font-size="10" fill="#64748b">POST /auth/signup|login|logout</text>
  <text x="370" y="278" text-anchor="middle" font-size="10" fill="#64748b">GET  /auth/me  /auth/csrf</text>
  <text x="370" y="293" text-anchor="middle" font-size="10" fill="#64748b">GET  /dashboard</text>
  <text x="370" y="308" text-anchor="middle" font-size="10" fill="#64748b">POST /documents  (upload)</text>
  <text x="370" y="323" text-anchor="middle" font-size="10" fill="#64748b">GET|PATCH|DELETE /documents/:id</text>
  <text x="370" y="338" text-anchor="middle" font-size="10" fill="#64748b">GET  /reviews  POST /action</text>
  <text x="370" y="353" text-anchor="middle" font-size="10" fill="#64748b">GET  /search  /search/semantic</text>
  <text x="370" y="368" text-anchor="middle" font-size="10" fill="#64748b">GET  /audit/:id  /health</text>

  <!-- Agents App -->
  <rect x="490" y="228" width="200" height="155" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="590" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#a78bfa">apps.agents  (AI Core)</text>
  <text x="590" y="263" text-anchor="middle" font-size="10" fill="#64748b">DocumentCrewFactory</text>
  <text x="590" y="278" text-anchor="middle" font-size="10" fill="#64748b">DocumentWorkflow</text>
  <text x="590" y="293" text-anchor="middle" font-size="10" fill="#64748b">execute_document_workflow()</text>
  <text x="590" y="308" text-anchor="middle" font-size="10" fill="#64748b">WorkflowState (Pydantic)</text>
  <text x="590" y="323" text-anchor="middle" font-size="10" fill="#64748b">Django Signals (events)</text>
  <text x="590" y="338" text-anchor="middle" font-size="10" fill="#64748b">OCR · Policy · Search Tools</text>
  <text x="590" y="353" text-anchor="middle" font-size="10" fill="#64748b">5-Agent Prompt Library</text>
  <text x="590" y="368" text-anchor="middle" font-size="10" fill="#64748b">LangChain + Gemini LLM</text>

  <!-- Reviews App -->
  <rect x="710" y="228" width="160" height="155" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="790" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">apps.reviews</text>
  <text x="790" y="263" text-anchor="middle" font-size="10" fill="#64748b">trigger_review_workflow()</text>
  <text x="790" y="278" text-anchor="middle" font-size="10" fill="#64748b">send_review_notification()</text>
  <text x="790" y="293" text-anchor="middle" font-size="10" fill="#64748b">Review record upsert</text>
  <text x="790" y="308" text-anchor="middle" font-size="10" fill="#64748b">Audit log append</text>
  <text x="790" y="323" text-anchor="middle" font-size="10" fill="#64748b">Email dispatch</text>

  <!-- Auth / Core -->
  <rect x="890" y="228" width="160" height="155" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="970" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">apps.core / auth</text>
  <text x="970" y="263" text-anchor="middle" font-size="10" fill="#64748b">Django Auth (SQLite)</text>
  <text x="970" y="278" text-anchor="middle" font-size="10" fill="#64748b">JWT Access (60 min)</text>
  <text x="970" y="293" text-anchor="middle" font-size="10" fill="#64748b">JWT Refresh (7 days)</text>
  <text x="970" y="308" text-anchor="middle" font-size="10" fill="#64748b">CSRF protection</text>
  <text x="970" y="323" text-anchor="middle" font-size="10" fill="#64748b">RBAC: customer</text>
  <text x="970" y="338" text-anchor="middle" font-size="10" fill="#64748b">       reviewer / admin</text>
  <text x="970" y="353" text-anchor="middle" font-size="10" fill="#64748b">seed_demo command</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 3: SERVICES -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="420" width="1040" height="130" rx="8" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
  <text x="50" y="440" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">SERVICE LAYER</text>

  <rect x="50" y="448" width="220" height="90" rx="6" fill="#0f172a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="160" y="466" text-anchor="middle" font-size="11" font-weight="bold" fill="#67e8f9">MongoService</text>
  <text x="160" y="482" text-anchor="middle" font-size="10" fill="#64748b">insert / find / update / upsert</text>
  <text x="160" y="497" text-anchor="middle" font-size="10" fill="#64748b">delete / count / append_audit_log</text>
  <text x="160" y="512" text-anchor="middle" font-size="10" fill="#64748b">Collections: documents · pages</text>
  <text x="160" y="527" text-anchor="middle" font-size="10" fill="#64748b">extractions · reviews · audit_logs</text>

  <rect x="290" y="448" width="220" height="90" rx="6" fill="#0f172a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="400" y="466" text-anchor="middle" font-size="11" font-weight="bold" fill="#67e8f9">VectorSearchService</text>
  <text x="400" y="482" text-anchor="middle" font-size="10" fill="#64748b">embed_text() — MiniLM-L6-v2</text>
  <text x="400" y="497" text-anchor="middle" font-size="10" fill="#64748b">semantic_search() — Atlas / local</text>
  <text x="400" y="512" text-anchor="middle" font-size="10" fill="#64748b">update_document_embedding()</text>
  <text x="400" y="527" text-anchor="middle" font-size="10" fill="#64748b">ensure_indexes() — cosine 165-dim</text>

  <rect x="530" y="448" width="220" height="90" rx="6" fill="#0f172a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="640" y="466" text-anchor="middle" font-size="11" font-weight="bold" fill="#67e8f9">MinioStorage</text>
  <text x="640" y="482" text-anchor="middle" font-size="10" fill="#64748b">upload_bytes() / download_bytes()</text>
  <text x="640" y="497" text-anchor="middle" font-size="10" fill="#64748b">presigned_put_url() (30 min)</text>
  <text x="640" y="512" text-anchor="middle" font-size="10" fill="#64748b">presigned_get_url() (120 min)</text>
  <text x="640" y="527" text-anchor="middle" font-size="10" fill="#64748b">stat() / delete() — S3-compatible</text>

  <rect x="770" y="448" width="280" height="90" rx="6" fill="#0f172a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="910" y="466" text-anchor="middle" font-size="11" font-weight="bold" fill="#67e8f9">NotificationService</text>
  <text x="910" y="482" text-anchor="middle" font-size="10" fill="#64748b">send_review_email(to, doc_id, rev_id)</text>
  <text x="910" y="497" text-anchor="middle" font-size="10" fill="#64748b">Django send_mail → SMTP</text>
  <text x="910" y="512" text-anchor="middle" font-size="10" fill="#64748b">Review portal deep-link in body</text>
  <text x="910" y="527" text-anchor="middle" font-size="10" fill="#64748b">Graceful fallback if SMTP unavailable</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 4: INFRASTRUCTURE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="570" width="1040" height="130" rx="8" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
  <text x="50" y="590" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">INFRASTRUCTURE LAYER</text>

  <!-- SQLite -->
  <rect x="50" y="598" width="160" height="90" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">SQLite</text>
  <text x="130" y="635" text-anchor="middle" font-size="10" fill="#64748b">control_plane.sqlite3</text>
  <text x="130" y="650" text-anchor="middle" font-size="10" fill="#64748b">Django auth users</text>
  <text x="130" y="665" text-anchor="middle" font-size="10" fill="#64748b">Sessions · Admin</text>
  <text x="130" y="680" text-anchor="middle" font-size="10" fill="#64748b">Migrations</text>

  <!-- MongoDB -->
  <rect x="230" y="598" width="200" height="90" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">MongoDB 7</text>
  <text x="330" y="635" text-anchor="middle" font-size="10" fill="#64748b">documents · pages · extractions</text>
  <text x="330" y="650" text-anchor="middle" font-size="10" fill="#64748b">validation_results · reviews</text>
  <text x="330" y="665" text-anchor="middle" font-size="10" fill="#64748b">audit_logs · users</text>
  <text x="330" y="680" text-anchor="middle" font-size="10" fill="#64748b">Vector index (cosine, 165-dim)</text>

  <!-- MinIO -->
  <rect x="450" y="598" width="180" height="90" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">MinIO / Local FS</text>
  <text x="540" y="635" text-anchor="middle" font-size="10" fill="#64748b">S3-compatible object store</text>
  <text x="540" y="650" text-anchor="middle" font-size="10" fill="#64748b">Bucket: documents</text>
  <text x="540" y="665" text-anchor="middle" font-size="10" fill="#64748b">incoming/{doc_id}/{file}</text>
  <text x="540" y="680" text-anchor="middle" font-size="10" fill="#64748b">USE_LOCAL_STORAGE toggle</text>

  <!-- Gemini AI -->
  <rect x="650" y="598" width="180" height="90" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="740" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">Google Gemini AI</text>
  <text x="740" y="635" text-anchor="middle" font-size="10" fill="#64748b">gemini-2.5-flash (default)</text>
  <text x="740" y="650" text-anchor="middle" font-size="10" fill="#64748b">LangChain ChatGoogleGenAI</text>
  <text x="740" y="665" text-anchor="middle" font-size="10" fill="#64748b">temperature=0.1</text>
  <text x="740" y="680" text-anchor="middle" font-size="10" fill="#64748b">GEMINI_API_KEY required</text>

  <!-- SMTP / MailHog -->
  <rect x="850" y="598" width="200" height="90" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="950" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">SMTP / MailHog</text>
  <text x="950" y="635" text-anchor="middle" font-size="10" fill="#64748b">Review notification emails</text>
  <text x="950" y="650" text-anchor="middle" font-size="10" fill="#64748b">Dev: MailHog :1025 / :8025</text>
  <text x="950" y="665" text-anchor="middle" font-size="10" fill="#64748b">Prod: external SMTP provider</text>
  <text x="950" y="680" text-anchor="middle" font-size="10" fill="#64748b">DEFAULT_FROM_EMAIL config</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 5: DEPLOYMENT -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="720" width="1040" height="80" rx="8" fill="#1a1f2e" stroke="#334155" stroke-width="1"/>
  <text x="50" y="740" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">DEPLOYMENT</text>

  <rect x="50" y="748" width="200" height="42" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="150" y="764" text-anchor="middle" font-size="10" font-weight="bold" fill="#94a3b8">Docker Compose (Dev)</text>
  <text x="150" y="780" text-anchor="middle" font-size="10" fill="#64748b">agentdoc · mongodb · minio · mailhog</text>

  <rect x="270" y="748" width="200" height="42" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="370" y="764" text-anchor="middle" font-size="10" font-weight="bold" fill="#94a3b8">Production Dockerfile</text>
  <text x="370" y="780" text-anchor="middle" font-size="10" fill="#64748b">Multi-stage · non-root · Gunicorn</text>

  <rect x="490" y="748" width="200" height="42" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="590" y="764" text-anchor="middle" font-size="10" font-weight="bold" fill="#94a3b8">Render.com (Cloud)</text>
  <text x="590" y="780" text-anchor="middle" font-size="10" fill="#64748b">render.yaml · render-start.sh</text>

  <rect x="710" y="748" width="200" height="42" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="810" y="764" text-anchor="middle" font-size="10" font-weight="bold" fill="#94a3b8">Security Hardening</text>
  <text x="810" y="780" text-anchor="middle" font-size="10" fill="#64748b">HSTS · SSL redirect · XSS filter</text>

  <rect x="930" y="748" width="120" height="42" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="990" y="764" text-anchor="middle" font-size="10" font-weight="bold" fill="#94a3b8">Health Check</text>
  <text x="990" y="780" text-anchor="middle" font-size="10" fill="#64748b">GET /api/health/</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Client → Backend -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="550" y1="175" x2="550" y2="200" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="560" y="192" font-size="9" fill="#3b82f6">HTTP/REST · JWT Bearer</text>

  <!-- Backend → Services -->
  <line x1="550" y1="400" x2="550" y2="420" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>

  <!-- Services → Infra -->
  <line x1="550" y1="550" x2="550" y2="570" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891b2"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
