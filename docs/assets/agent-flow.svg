<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Agent Flow</title>
  <desc id="desc">Presentation-style CrewAI agent flow with document stages and review branch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#fbf7ef"/><stop offset="100%" stop-color="#efe2ca"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#635646" flood-opacity="0.16"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#173225"/></marker>
    <style>
      .title{font:700 34px Arial,sans-serif;fill:#173225}.sub{font:400 17px Arial,sans-serif;fill:#5b6d63}.panel{fill:#fff8ef;stroke:#d7c8b4;stroke-width:2;rx:22;filter:url(#shadow)}
      .node{fill:#fff;stroke:#567162;stroke-width:2;rx:18}.crew{fill:#eef2ff;stroke:#4564f2;stroke-width:2;rx:18}.warn{fill:#fff4df;stroke:#d98e04;stroke-width:2;rx:18}.audit{fill:#f8ebe5;stroke:#b3452f;stroke-width:2;rx:18}
      .label{font:700 18px Arial,sans-serif;fill:#173225}.small{font:400 13px Arial,sans-serif;fill:#526258}.arrow{stroke:#173225;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <text class="title" x="46" y="58">Agent Flow</text>
  <text class="sub" x="46" y="88">CrewAI stage sequence with structured outputs and human escalation</text>
  <rect class="panel" x="44" y="126" width="1312" height="574"/>
  <rect class="node" x="88" y="182" width="150" height="72"/><text class="label" x="125" y="220">Ingestion</text>
  <rect class="node" x="286" y="182" width="170" height="72"/><text class="label" x="326" y="220">Preprocessing</text>
  <rect class="node" x="504" y="182" width="150" height="72"/><text class="label" x="534" y="220">Classification</text>
  <rect class="node" x="702" y="182" width="150" height="72"/><text class="label" x="744" y="220">Extraction</text>
  <path class="arrow" d="M238 218 H286"/><path class="arrow" d="M456 218 H504"/><path class="arrow" d="M654 218 H702"/>
  <rect class="crew" x="220" y="360" width="170" height="78"/><text class="label" x="270" y="400">Validation</text><text class="small" x="244" y="422">rules, completeness, risk</text>
  <rect class="crew" x="460" y="360" width="170" height="78"/><text class="label" x="517" y="400">Routing</text><text class="small" x="486" y="422">auto-complete path</text>
  <rect class="warn" x="700" y="360" width="180" height="78"/><text class="label" x="751" y="400">Exception</text><text class="small" x="726" y="422">normalize escalation case</text>
  <path class="arrow" d="M777 254 V399 H390"/><path class="arrow" d="M390 399 H460"/><path class="arrow" d="M630 399 H700"/>
  <rect class="warn" x="378" y="540" width="190" height="82"/><text class="label" x="441" y="580">Review Agent</text><text class="small" x="410" y="602">instructions and team owner</text>
  <rect class="audit" x="638" y="540" width="190" height="82"/><text class="label" x="700" y="580">Audit Agent</text><text class="small" x="676" y="602">timeline and final state</text>
  <path class="arrow" d="M790 438 V581 H568"/><path class="arrow" d="M568 581 H638"/><path class="arrow" d="M545 438 V540"/>
  <rect class="node" x="938" y="300" width="330" height="142"/><text class="label" x="982" y="340">Structured outputs at every stage</text><text class="small" x="968" y="368">Every agent produces a Pydantic output model.</text><text class="small" x="968" y="392">That keeps downstream routing, review, and audit data deterministic.</text><text class="small" x="968" y="416">Gemini performs the reasoning, while CrewAI coordinates the workflow.</text>
</svg>
