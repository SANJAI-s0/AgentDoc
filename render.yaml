# Render Blueprint for AgentDoc
# Free tier deployment - Single service with integrated frontend

services:
  # Backend with Integrated Frontend
  - type: web
    name: agentdoc
    env: python
    region: oregon
    plan: free
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: |
      cd backend
      python manage.py seed_demo --skip-if-present
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: agentdoc
      - key: USE_LOCAL_STORAGE
        value: "1"
      - key: MEDIA_ROOT
        value: /opt/render/project/src/backend/media
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "1"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "1"
      - key: DJANGO_SESSION_COOKIE_HTTPONLY
        value: "1"
      - key: DJANGO_CSRF_COOKIE_HTTPONLY
        value: "1"
      - key: DJANGO_USE_X_FORWARDED_HOST
        value: "1"
      - key: DJANGO_TRUST_X_FORWARDED_PROTO
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: BACKEND_URL
        sync: false
      - key: REVIEW_PORTAL_URL
        sync: false
      - key: AGENT_INTERNAL_TOKEN
        generateValue: true
      - key: JWT_ACCESS_MINUTES
        value: "60"
      - key: JWT_REFRESH_DAYS
        value: "7"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: LOG_LEVEL
        value: "INFO"
