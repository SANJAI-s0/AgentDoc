version: "3.9"

services:
  django-api:
    build:
      context: ./backend
    container_name: agentdoc-django
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file:
      - .env.docker
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - minio

  react-web:
    build:
      context: ./frontend
    container_name: agentdoc-react
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - django-api

  mongodb:
    image: mongo:7
    container_name: agentdoc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: agentdoc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio_data:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio'; sleep 1; done;
      /usr/bin/mc mb local/documents || true;
      /usr/bin/mc anonymous set private local/documents || true;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: agentdoc-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
