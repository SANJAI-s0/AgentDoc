name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & type-check
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend --select E,F,W,I --ignore E501

  # ─────────────────────────────────────────────
  # 2. Backend tests
  # ─────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: agentdoc_ci
      USE_LOCAL_STORAGE: "1"
      GEMINI_API_KEY: ""
      MONGODB_ENABLE_VECTOR_SEARCH: "0"

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Compile source (syntax check)
        run: python -m compileall backend -q

      - name: Run tests
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: pytest tests -q --maxfail=3 --tb=short

  # ─────────────────────────────────────────────
  # 3. Docker build check
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: agentdoc:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
