name: CD Render

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Deploy single integrated service to Render
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Validate deploy hook secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set."
            echo "Go to: GitHub repo → Settings → Secrets → Actions → New secret"
            echo "Get the hook URL from: Render dashboard → agentdoc service → Settings → Deploy Hook"
            exit 1
          fi

      - name: Trigger Render deploy
        run: |
          response=$(curl -fsS -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)
          echo "Response: $body"
          echo "HTTP status: $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render deploy hook returned HTTP $http_code"
            exit 1
          fi

      - name: Deploy triggered
        run: |
          echo "Render deploy triggered successfully."
          echo "Monitor progress at: https://dashboard.render.com"
